name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['**']

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        # --legacy-peer-deps: VitePress's @docsearch/css transitive declares
        # `react: < 19.0.0` as a peer-dep. Our top-level react is ^19. The
        # tree resolves correctly but npm ci's strict check fails without
        # the flag. Acceptable until @docsearch publishes a react@19-aware version.
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm test
